name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (py3.13)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas_ci_password
          POSTGRES_DB: atlas_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U atlas -d atlas_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
    env:
      ATLAS_ENV: test
      ATLAS_DATABASE_URL: postgresql+asyncpg://atlas:atlas_ci_password@localhost:5432/atlas_test
      ATLAS_JWT_SIGNING_KEY: ci_jwt_signing_key_00000000000000000000000000000000
      ATLAS_OTP_PEPPER: ci_otp_pepper_00000000000000000000000000000000000000
      ATLAS_SESSION_TTL_HOURS: "8"
      ATLAS_PAYSTACK_STUB_MODE: "true"
      ATLAS_PAYSTACK_WEBHOOK_SECRET: ci_paystack_webhook_secret_do_not_use_in_prod
      ATLAS_WALLET_ALLOW_STUB_DRAW: "false"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: mypy
        run: mypy src
      - name: pytest
        run: pytest -ra

  admin:
    name: Admin (node 20 + pnpm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: admin/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test

  mobile:
    name: Mobile (Flutter analyze)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # --no-fatal-infos: info-severity lints (withOpacity deprecations,
      # prefer_const_constructors, require_trailing_commas) are style
      # nits, not correctness bugs — they don't gate the build. Errors
      # and warnings still fail. Cleanup pass is tracked separately.
      - run: flutter analyze --no-fatal-infos

  module-boundaries:
    # Enforces two invariants per week-3-build-plan §4.4 + ADR-005:
    #   1. No SELECT/INSERT on users|otps|sessions outside atlas/identity/.
    #   2. Every audit_log write goes through atlas/audit_log/writer.py.
    # Grep-only; will be replaced by an AST check when scope grows.
    name: Module boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: identity table access outside atlas.identity
        run: |
          set -e
          if grep -rnE '\b(users|otps|sessions)\b' backend/src/atlas \
              --include='*.py' \
              --exclude-dir=identity \
              | grep -E '(select|insert|update|delete|table|Column)' ; then
            echo "::error::identity tables referenced outside atlas.identity/"
            exit 1
          fi
      - name: audit_log write outside writer.py
        run: |
          set -e
          # Word-boundary the second grep so `writer` (contains `write`) in
          # the legitimate `from atlas.audit_log import writer as audit`
          # imports does NOT trip the check. The actual invariant we care
          # about is any raw INSERT / UPDATE / DELETE on audit_log or a
          # session.execute() that writes rows outside the writer module.
          if grep -rnE '\baudit_log\b' backend/src/atlas \
              --include='*.py' \
              --exclude-dir=audit_log \
              | grep -Eiw '(insert|update|delete|execute)' ; then
            echo "::error::audit_log writes must go through atlas.audit_log.writer"
            exit 1
          fi
      - name: env-var reads outside config.py (ADR-012)
        run: |
          set -e
          if grep -rnE '(os\.environ|os\.getenv|environ\.get)' backend/src/atlas \
              --include='*.py' \
              --exclude=config.py ; then
            echo "::error::env-var reads must live in atlas.config"
            exit 1
          fi
      - name: LedgerEntry references outside atlas.wallet (ADR-003)
        run: |
          set -e
          # LedgerEntry (the ORM class) is the only symbol that maps to
          # ledger_entries rows. Its INSERT sites must live in wallet/ledger.py;
          # allowing any read/write elsewhere would let a caller bypass
          # post_transaction and skip the balance trigger's guarantee.
          if grep -rn 'LedgerEntry' backend/src/atlas \
              --include='*.py' \
              --exclude-dir=wallet ; then
            echo "::error::LedgerEntry writes must go through atlas.wallet.ledger.post_transaction"
            exit 1
          fi
      - name: no mutable balance column (ADR-003 §Invariants 1)
        run: |
          set -e
          # Any migration or ORM that adds a `balance` column to a users-
          # or-accounts-shaped table violates the "no mutable balance" rule.
          # balance_of() is a function name, not a column — safe.
          if grep -rnE "(add_column|Column|column).*['\"]balance['\"]" \
              backend/migrations backend/src/atlas \
              --include='*.py' ; then
            echo "::error::ledger has no mutable balance column (ADR-003 §Invariants 1)"
            exit 1
          fi
      - name: no direct Paystack SDK imports outside adapter (ADR-008 §Invariants 1)
        run: |
          set -e
          # Payment code depends on atlas.payment.providers.protocol.PaymentProvider.
          # Vendor SDK imports (paystack, paystackapi, pypaystack) may live only
          # inside atlas/payment/providers/paystack.py. Fixture stubs count too —
          # the module boundary is the whole providers/paystack.py file.
          if grep -rnE '^\s*(import|from)\s+(paystack|paystackapi|pypaystack)' \
              backend/src/atlas \
              --include='*.py' \
              --exclude='paystack.py' ; then
            echo "::error::Paystack SDK imports must live in atlas/payment/providers/paystack.py"
            exit 1
          fi
      - name: get_secret_value discipline (ADR-012)
        run: |
          set -e
          # Whitelisted modules that legitimately unwrap SecretStr for the
          # underlying crypto/network call. Adding a new caller requires an
          # explicit change here — the governance point is deliberate.
          #   db.py                          — database URL for asyncpg
          #   identity/session_service.py    — JWT signing/verify
          #   identity/otp_service.py        — HMAC pepper
          #   payment/providers/paystack.py  — outbound API auth + webhook HMAC
          if grep -rn 'get_secret_value' backend/src/atlas \
              --include='*.py' \
              --exclude='db.py' \
              --exclude='session_service.py' \
              --exclude='otp_service.py' \
              --exclude='paystack.py' ; then
            echo "::error::get_secret_value() is restricted; add the module to the whitelist in ci.yaml if genuinely needed."
            exit 1
          fi
