name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (py3.13)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas_ci_password
          POSTGRES_DB: atlas_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U atlas -d atlas_test"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
    env:
      ATLAS_ENV: test
      ATLAS_DATABASE_URL: postgresql+asyncpg://atlas:atlas_ci_password@localhost:5432/atlas_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: mypy
        run: mypy src
      - name: pytest
        run: pytest -ra

  admin:
    name: Admin (node 20 + pnpm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: admin/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test

  mobile:
    name: Mobile (Flutter analyze)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze

  module-boundaries:
    # Enforces two invariants per week-3-build-plan §4.4 + ADR-005:
    #   1. No SELECT/INSERT on users|otps|sessions outside atlas/identity/.
    #   2. Every audit_log write goes through atlas/audit_log/writer.py.
    # Grep-only; will be replaced by an AST check when scope grows.
    name: Module boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: identity table access outside atlas.identity
        run: |
          set -e
          if grep -rnE '\b(users|otps|sessions)\b' backend/src/atlas \
              --include='*.py' \
              --exclude-dir=identity \
              | grep -E '(select|insert|update|delete|table|Column)' ; then
            echo "::error::identity tables referenced outside atlas.identity/"
            exit 1
          fi
      - name: audit_log write outside writer.py
        run: |
          set -e
          if grep -rnE '\baudit_log\b' backend/src/atlas \
              --include='*.py' \
              --exclude-dir=audit_log \
              | grep -Ei '(insert|write|append|execute)' ; then
            echo "::error::audit_log writes must go through atlas.audit_log.writer"
            exit 1
          fi
      - name: env-var reads outside config.py (ADR-012)
        run: |
          set -e
          if grep -rnE '(os\.environ|os\.getenv|environ\.get)' backend/src/atlas \
              --include='*.py' \
              --exclude=config.py ; then
            echo "::error::env-var reads must live in atlas.config"
            exit 1
          fi
